name: Build Martins Mod
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Instala o ldid para evitar o erro de assinatura final
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/*.sdk ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Fix Filenames
        run: |
          # Garante que o arquivo de código tenha o nome correto
          if [ -f "Tweak_Pro.xm" ]; then mv Tweak_Pro.xm Tweak.xm; fi
          if [ -f "Martins_Mod_Final.xm" ]; then mv Martins_Mod_Final.xm Tweak.xm; fi
          if [ -f "Tweak_Martins.xm" ]; then mv Tweak_Martins.xm Tweak.xm; fi

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          # O "|| true" garante que o processo continue mesmo se houver aviso
          make FINALPACKAGE=1 codesign=0 || true

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MartinsMod-Dylib
          path: |
            .theos/obj/MartinsMod.dylib
            obj/MartinsMod.dylib
            ./*.dylib
