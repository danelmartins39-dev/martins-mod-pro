name: Build Martins Mod
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Instala o ldid para evitar o erro de assinatura
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV
          # Adiciona o Theos ao PATH para o sistema achar as ferramentas
          echo "/Users/runner/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/*.sdk ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Fix Filenames
        run: |
          if [ -f "Tweak_Pro.xm" ]; then mv Tweak_Pro.xm Tweak.xm; fi
          if [ -f "Martins_Mod_Final.xm" ]; then mv Martins_Mod_Final.xm Tweak.xm; fi
          if [ -f "Tweak_Martins.xm" ]; then mv Tweak_Martins.xm Tweak.xm; fi

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          # Agora com ldid instalado, a compilação será 100% limpa
          make FINALPACKAGE=1
          
          # Cria a pasta de entrega e copia a dylib
          mkdir -p entrega
          find .theos/obj -name "*.dylib" -exec cp {} entrega/ \;
          # Caso não esteja na pasta oculta, procura na pasta normal
          find obj -name "*.dylib" -exec cp {} entrega/ \; || true

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MartinsMod-Dylib
          path: entrega/*.dylib
