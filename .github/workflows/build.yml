name: Build Martins Mod
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # O ldid já vem no Mac do GitHub, então apenas garantimos o Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/*.sdk ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Fix Filenames
        run: |
          if [ -f "Tweak_Pro.xm" ]; then mv Tweak_Pro.xm Tweak.xm; fi
          if [ -f "Martins_Mod_Final.xm" ]; then mv Martins_Mod_Final.xm Tweak.xm; fi
          if [ -f "Tweak_Martins.xm" ]; then mv Tweak_Martins.xm Tweak.xm; fi

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          # Compilação limpa
          make FINALPACKAGE=1
          
          # COMANDO CAÇADOR DEFINITIVO:
          mkdir -p entrega
          # Procura em todas as pastas por qualquer arquivo .dylib e copia para 'entrega'
          find . -name "*.dylib" -exec cp {} entrega/ \;

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MartinsMod-Dylib
          path: entrega/
