name: Build Martins Mod
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/*.sdk ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Fix Filenames
        run: |
          if [ -f "Tweak_Pro.xm" ]; then mv Tweak_Pro.xm Tweak.xm; fi
          if [ -f "Martins_Mod_Final.xm" ]; then mv Martins_Mod_Final.xm Tweak.xm; fi
          if [ -f "Tweak_Martins.xm" ]; then mv Tweak_Martins.xm Tweak.xm; fi

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          # Força o uso do SDK 16.5 que baixamos
          make FINALPACKAGE=1 codesign=0 SDKVERSION=16.5 SYSROOT=~/theos/sdks/iPhoneOS16.5.sdk
        
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MartinsMod-Dylib
          path: .theos/obj/*.dylib
