name: Build Martins Mod
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Instalação forçada e silenciosa do Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip master.zip
          mv sdks-master/*.sdk ~/theos/sdks/
          rm -rf master.zip sdks-master

      - name: Fix Filenames
        run: |
          # Garante que o arquivo tenha o nome que o Makefile espera
          if [ -f "Tweak_Pro.xm" ]; then mv Tweak_Pro.xm Tweak.xm; fi
          if [ -f "Martins_Mod_Final.xm" ]; then mv Martins_Mod_Final.xm Tweak.xm; fi

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          make FINALPACKAGE=1
        
      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: MartinsMod-Dylib
          path: .theos/obj/*.dylib
