name: iOS Tweak Build (Bypass)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Theos and ldid
      run: |
        # Instala a ferramenta de assinatura
        brew install ldid
        
        # Configura o ambiente Theos
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
        unzip -q sdks.zip
        mv sdks-master/* $THEOS/sdks/
        rm -rf sdks-master sdks.zip

    - name: Build Tweak
      run: |
        export THEOS=~/theos
        # Gera apenas a dylib de forma limpa
        make FINALPACKAGE=1
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MartinsBypass-Dylib
        path: .theos/obj/MartinsBypass.dylib
